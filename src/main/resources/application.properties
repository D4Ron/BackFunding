# ===== APPLICATION =====
spring.application.name=crowdfunding
server.port=${PORT:8080}

# ===== DATABASE =====
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===== FLYWAY =====
spring.flyway.enabled=false

# ===== JWT =====
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ===== EMAIL =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.from=${MAIL_USERNAME}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ===== FEDAPAY =====
app.fedapay.secret-key=${FEDAPAY_SECRET_KEY}
app.fedapay.base-url=https://sandbox-api.fedapay.com/v1
app.fedapay.callback-url=${FEDAPAY_CALLBACK_URL}

# ===== PLATFORM =====
app.platform.commission-rate=0.05

# ===== SWAGGER =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html